<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>boxdbrain</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">

</head>

<body class="bg-zinc-900 text-white min-h-screen">

<div class="max-w-5xl mx-auto px-6 py-12">

<h1 class="text-4xl font-bold text-green-400 text-center mb-2">
boxdbrain
</h1>

<p class="text-center text-zinc-400 mb-10">
Get movie recommendations from your Letterboxd diary
</p>

<div class="flex gap-3 mb-10">

<input
id="username"
placeholder="Letterboxd username"
class="flex-1 p-3 rounded bg-zinc-800 border border-zinc-700"
/>

<button
id="searchBtn"
class="bg-green-500 hover:bg-green-400 px-6 py-3 rounded font-semibold text-black"
>
Recommend
</button>

</div>

<div id="loading" class="hidden text-center text-zinc-400 mb-6">
Analyzing your diary...
</div>

<div id="results" class="mt-10"></div>

</div>

<script src="script.js"></script>

</body>
</html>
